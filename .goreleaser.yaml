version: 2

builds:
  - main: ./cmd/sshtui
    binary: sshtui
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/diegovrocha/sshtui/internal/ui.Version={{.Version}}

archives:
  - name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

release:
  # Replace existing assets when re-running the workflow (avoids 422
  # "already_exists" errors if the release was already created by a
  # previous attempt).
  replace_existing_artifacts: true

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
